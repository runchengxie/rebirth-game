name: Apply content system v2

on:
  push:
    branches:
      - feat/content-system-v2
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  migrate:
    if: github.head_ref == 'feat/content-system-v2' || github.ref_name == 'feat/content-system-v2'
    runs-on: ubuntu-latest
    steps:
      - name: Clone feature branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: git clone --quiet --depth 1 --branch feat/content-system-v2 "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .
      - name: Rebuild migration script
        run: |
          cat scripts/.content-system-v2-part* | base64 --decode | gzip --decompress > scripts/apply_content_system_v2.py
          python -m py_compile scripts/apply_content_system_v2.py
      - name: Apply migration
        run: |
          if ! python scripts/apply_content_system_v2.py > migration-output.log 2>&1; then
            cat migration-output.log
            exit 1
          fi
      - name: Commit generated changes
        run: |
          rm -f scripts/.content-system-v2-part* scripts/apply_content_system_v2.py migration-output.log .github/workflows/apply-content-system-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "feat: introduce content system v2"
          git push origin HEAD:feat/content-system-v2
