name: Apply dialogue refactor

on:
  push:
    branches:
      - feat/affinity-dialogue-beats

permissions:
  contents: write

jobs:
  apply:
    if: github.event.head_commit.message == 'ci: apply dialogue refactor'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/affinity-dialogue-beats
          fetch-depth: 0
      - name: Apply patch
        run: |
          base64 --decode .github/dialogue-refactor.patch.b64 > /tmp/dialogue-refactor.patch
          git apply --index /tmp/dialogue-refactor.patch
          git rm -f .github/dialogue-refactor.patch.b64
          git rm -f .github/workflows/apply-dialogue-refactor.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat: diversify relationship dialogue beats"
          git push origin HEAD:feat/affinity-dialogue-beats
