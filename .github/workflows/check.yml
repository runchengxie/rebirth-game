name: Check

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run checks
        shell: bash
        run: |
          set +e
          npm run check 2>&1 | tee check.log
          status=${PIPESTATUS[0]}
          tail -n 200 check.log > check-tail.log
          exit "$status"
      - name: Upload check log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: check-log
          path: check-tail.log
