name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install frontend dependencies
        run: npm ci
      - name: Install Python tooling
        run: python -m pip install ruff basedpyright
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: Python compile
        run: python -m compileall scripts
      - name: BasedPyright
        run: basedpyright scripts
      - name: Validate data
        run: python scripts/validate_data.py
      - name: Validate frontend
        run: node scripts/validate_frontend.js
      - name: ESLint
        run: npm run lint
      - name: Typecheck frontend
        run: npm run typecheck
      - name: Unit tests
        run: npm run test:run
      - name: Build frontend
        run: npm run build
