name: Debug check

on:
  pull_request:

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture checks
        run: npm run check > check.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: dialogue-check-log
          path: check.log
          retention-days: 1
