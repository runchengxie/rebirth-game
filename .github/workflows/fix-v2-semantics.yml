name: Fix v2 semantic data

on:
  push:
    branches:
      - feat/content-system-v2

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Clone feature branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: git clone --quiet --depth 1 --branch feat/content-system-v2 "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .
      - name: Correct non-analytical semantics
        run: node scripts/fix_v2_non_analytical_semantics.mjs
      - name: Commit corrected content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/game/content/2023.json src/game/content/2024.json src/game/content/2025.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "fix: correct non-analytical decision semantics"
          git push origin HEAD:feat/content-system-v2
