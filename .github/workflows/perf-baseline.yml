name: Performance baseline

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  baseline:
    if: github.head_ref == 'perf/lazy-timeline-tree'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Build and record assets
        shell: bash
        run: |
          npm run build -- --sourcemap > build.log 2>&1
          node <<'NODE' > source-map-report.txt
          const fs = require('fs');
          const path = require('path');
          const assets = path.join(process.cwd(), 'dist', 'assets');
          const mapName = fs.readdirSync(assets).find((name) => /^index-.*\.js\.map$/.test(name));
          if (!mapName) throw new Error('index source map not found');
          const map = JSON.parse(fs.readFileSync(path.join(assets, mapName), 'utf8'));
          const rows = map.sources.map((source, index) => ({
            source,
            bytes: Buffer.byteLength(map.sourcesContent?.[index] ?? '', 'utf8'),
          })).sort((a, b) => b.bytes - a.bytes);
          console.log(`index map: ${mapName}`);
          for (const row of rows.slice(0, 80)) console.log(`${row.bytes}\t${row.source}`);
          NODE
          {
            echo "=== JavaScript assets ==="
            find dist/assets -maxdepth 1 -type f -name '*.js' -printf '%s %f\n' | sort -nr
            echo "=== CSS assets ==="
            find dist/assets -maxdepth 1 -type f -name '*.css' -printf '%s %f\n' | sort -nr
            echo "=== Largest index sources ==="
            cat source-map-report.txt
            echo "=== Build output ==="
            cat build.log
          } > perf-baseline.txt
      - uses: actions/upload-artifact@v4
        with:
          name: perf-baseline
          path: perf-baseline.txt
