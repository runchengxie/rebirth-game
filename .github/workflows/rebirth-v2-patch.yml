name: Rebirth v2 UI integration

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  integrate:
    if: github.head_ref == 'feat/rebirth-office-key-months'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply UI integration patch
        run: python scripts/dev/apply_rebirth_ui_patch.py
      - name: Commit integration
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No integration changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src
          git commit -m "feat: 接入年度流程图与研究室界面"
          git push origin HEAD:${{ github.head_ref }}
