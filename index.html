<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>重生选股游戏</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --surface: #ffffff;
      --ink: #172026;
      --muted: #64727d;
      --line: #dce3e8;
      --green: #138a54;
      --green-soft: #e7f5ee;
      --red: #c43d3d;
      --red-soft: #fae8e8;
      --blue: #2867b2;
      --blue-soft: #e6f0fb;
      --gold: #a86900;
      --gold-soft: #fff4d8;
      --shadow: 0 14px 36px rgba(23, 32, 38, 0.08);
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      background: var(--bg);
      color: var(--ink);
    }

    button,
    input {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      cursor: pointer;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 0 18px;
    }

    .brand {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 42px);
      line-height: 1.08;
      font-weight: 800;
    }

    .brand p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .segmented {
      display: inline-flex;
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: 8px;
      overflow: hidden;
      min-height: 40px;
    }

    .segmented button {
      border: 0;
      border-right: 1px solid var(--line);
      background: transparent;
      color: var(--ink);
      min-width: 70px;
      padding: 0 14px;
      height: 40px;
    }

    .segmented button:last-child {
      border-right: 0;
    }

    .segmented button.active {
      background: var(--ink);
      color: #fff;
    }

    .money-input {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 42px;
      padding: 0 10px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .money-input input {
      width: 108px;
      border: 0;
      outline: 0;
      color: var(--ink);
      background: transparent;
      font-weight: 700;
    }

    .icon-button,
    .primary-button {
      height: 42px;
      border: 1px solid var(--ink);
      border-radius: 8px;
      background: var(--ink);
      color: #fff;
      padding: 0 16px;
      font-weight: 700;
      white-space: nowrap;
    }

    .icon-button {
      width: 42px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      font-size: 18px;
    }

    .status-band {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .stat {
      padding: 16px;
      min-width: 0;
      border-right: 1px solid var(--line);
    }

    .stat:last-child {
      border-right: 0;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .stat strong {
      display: block;
      font-size: clamp(18px, 2.4vw, 28px);
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    .play {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 20px;
      margin-top: 22px;
      align-items: start;
    }

    .question-panel,
    .chart-panel,
    .result-band,
    .history-panel,
    .empty-state {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .question-panel {
      padding: 18px;
    }

    .month-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .month-head h2 {
      margin: 0;
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1.1;
    }

    .month-head .dates {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
      white-space: nowrap;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .option {
      min-height: 154px;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 16px;
      text-align: left;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .option:hover:not(:disabled) {
      transform: translateY(-2px);
      border-color: #9fb5c6;
    }

    .option:disabled {
      cursor: default;
    }

    .option.correct {
      border-color: var(--green);
      background: var(--green-soft);
    }

    .option.wrong {
      border-color: var(--red);
      background: var(--red-soft);
    }

    .option.missed {
      border-color: var(--gold);
      background: var(--gold-soft);
    }

    .option-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }

    .stock-name {
      min-width: 0;
    }

    .stock-name strong {
      display: block;
      font-size: 22px;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .stock-name span,
    .meta {
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .rank-badge {
      flex: 0 0 auto;
      height: 28px;
      min-width: 52px;
      padding: 0 8px;
      display: inline-grid;
      place-items: center;
      border-radius: 999px;
      background: var(--blue-soft);
      color: var(--blue);
      font-size: 12px;
      font-weight: 800;
    }

    .option-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 30px;
    }

    .return {
      font-size: 20px;
      font-weight: 800;
    }

    .return.up {
      color: var(--green);
    }

    .return.down {
      color: var(--red);
    }

    .hidden-return {
      color: var(--muted);
      font-size: 13px;
    }

    .chart-panel {
      padding: 16px;
    }

    .chart-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .chart-title h2 {
      margin: 0;
      font-size: 18px;
    }

    .chart-title span {
      color: var(--muted);
      font-size: 12px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 250px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfd;
    }

    .legend {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .key {
      width: 22px;
      height: 3px;
      border-radius: 999px;
      background: var(--green);
    }

    .key.best {
      background: var(--gold);
    }

    .result-band {
      margin-top: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .result-copy {
      min-width: 0;
    }

    .result-copy strong {
      display: block;
      font-size: 18px;
      overflow-wrap: anywhere;
    }

    .result-copy span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .history-panel {
      margin-top: 20px;
      overflow: hidden;
    }

    .history-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .history-head h2 {
      margin: 0;
      font-size: 18px;
    }

    .history-table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
      font-size: 14px;
    }

    th,
    td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      background: #fafbfc;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .empty-state {
      margin-top: 20px;
      padding: 24px;
      text-align: center;
    }

    .empty-state h2 {
      margin: 0 0 8px;
    }

    .empty-state p {
      margin: 0;
      color: var(--muted);
    }

    @media (max-width: 920px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .controls {
        width: 100%;
        justify-content: flex-start;
      }

      .status-band {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .stat:nth-child(2) {
        border-right: 0;
      }

      .stat:nth-child(-n + 2) {
        border-bottom: 1px solid var(--line);
      }

      .play {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      .app {
        width: min(100% - 20px, 1180px);
        padding-top: 14px;
      }

      .status-band {
        grid-template-columns: 1fr;
      }

      .stat,
      .stat:nth-child(2) {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .stat:last-child {
        border-bottom: 0;
      }

      .options {
        grid-template-columns: 1fr;
      }

      .month-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .month-head .dates {
        text-align: left;
        white-space: normal;
      }

      .result-band {
        align-items: stretch;
        flex-direction: column;
      }

      .primary-button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <h1>重生选股游戏</h1>
        <p>从 1 万元开始，按月复利结算。</p>
      </div>
      <div class="controls">
        <div class="segmented" id="yearTabs" aria-label="年份"></div>
        <label class="money-input">
          本金
          <input id="initialCapital" type="number" min="100" step="100" value="10000">
        </label>
        <button class="icon-button" id="restartBtn" type="button" title="重新开始" aria-label="重新开始">↻</button>
      </div>
    </header>

    <section class="status-band" aria-label="状态">
      <div class="stat">
        <span>当前月份</span>
        <strong id="currentMonth">--</strong>
      </div>
      <div class="stat">
        <span>账户资金</span>
        <strong id="currentCapital">--</strong>
      </div>
      <div class="stat">
        <span>命中次数</span>
        <strong id="hitCount">--</strong>
      </div>
      <div class="stat">
        <span>一亿进度</span>
        <strong id="targetProgress">--</strong>
      </div>
    </section>

    <div id="gameRoot"></div>
  </main>

  <script src="data/game-data.js"></script>
  <script>
    const DATA = window.REBIRTH_GAME_DATA || {};
    const years = Object.keys(DATA).sort();

    const els = {
      yearTabs: document.getElementById("yearTabs"),
      initialCapital: document.getElementById("initialCapital"),
      restartBtn: document.getElementById("restartBtn"),
      currentMonth: document.getElementById("currentMonth"),
      currentCapital: document.getElementById("currentCapital"),
      hitCount: document.getElementById("hitCount"),
      targetProgress: document.getElementById("targetProgress"),
      gameRoot: document.getElementById("gameRoot")
    };

    const state = {
      year: years[years.length - 1],
      initialCapital: 10000,
      capital: 10000,
      monthIndex: 0,
      selectedId: null,
      locked: false,
      finished: false,
      history: []
    };

    function dataset() {
      return DATA[state.year];
    }

    function parseCapital() {
      const value = Number(els.initialCapital.value);
      if (!Number.isFinite(value) || value <= 0) return 10000;
      return value;
    }

    function formatMoney(value) {
      if (!Number.isFinite(value)) return "--";
      const sign = value < 0 ? "-" : "";
      const abs = Math.abs(value);
      if (abs >= 100000000) return `${sign}¥${(abs / 100000000).toFixed(2)}亿`;
      if (abs >= 10000) return `${sign}¥${(abs / 10000).toFixed(2)}万`;
      return `${sign}¥${abs.toLocaleString("zh-CN", { maximumFractionDigits: 0 })}`;
    }

    function formatMoneyFull(value) {
      return `¥${value.toLocaleString("zh-CN", { maximumFractionDigits: 0 })}`;
    }

    function formatPct(rate) {
      if (!Number.isFinite(rate)) return "--";
      const pct = rate * 100;
      const sign = pct > 0 ? "+" : "";
      return `${sign}${pct.toFixed(2)}%`;
    }

    function compactDate(raw) {
      if (!raw || raw.length !== 8) return raw || "";
      return `${raw.slice(0, 4)}-${raw.slice(4, 6)}-${raw.slice(6, 8)}`;
    }

    function startGame(year = state.year) {
      state.year = year;
      state.initialCapital = parseCapital();
      state.capital = state.initialCapital;
      state.monthIndex = 0;
      state.selectedId = null;
      state.locked = false;
      state.finished = false;
      state.history = [];
      render();
    }

    function renderYearTabs() {
      els.yearTabs.innerHTML = "";
      years.forEach((year) => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = `${year}版`;
        button.className = year === state.year ? "active" : "";
        button.addEventListener("click", () => startGame(year));
        els.yearTabs.appendChild(button);
      });
    }

    function optionClass(option) {
      if (!state.locked) return "option";
      if (option.isBest) return option.id === state.selectedId ? "option correct" : "option missed";
      if (option.id === state.selectedId) return "option wrong";
      return "option";
    }

    function renderOption(option) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = optionClass(option);
      button.disabled = state.locked;
      button.addEventListener("click", () => chooseOption(option));

      const returnClass = option.returnRate >= 0 ? "return up" : "return down";
      button.innerHTML = `
        <div class="option-top">
          <div class="stock-name">
            <strong>${escapeHtml(option.name)}</strong>
            <span>${escapeHtml(option.tsCode)}</span>
          </div>
          <span class="rank-badge">活跃 #${option.activeRank}</span>
        </div>
        <div class="meta">${escapeHtml(option.industry)} · ${escapeHtml(option.market || option.board || "A股")}</div>
        <div class="option-bottom">
          <span class="${state.locked ? returnClass : "hidden-return"}">
            ${state.locked ? formatPct(option.returnRate) : "月度收益待揭晓"}
          </span>
          <span class="meta">${state.locked ? `涨幅 #${option.returnRank}` : `交易日 ${option.tradingDays}`}</span>
        </div>
      `;
      return button;
    }

    function chooseOption(option) {
      if (state.locked || state.finished) return;
      const data = dataset();
      const month = data.months[state.monthIndex];
      const before = state.capital;
      const after = before * (1 + option.returnRate);
      state.capital = after;
      state.locked = true;
      state.selectedId = option.id;
      state.history.push({
        month: month.month,
        label: month.label,
        selected: option,
        best: month.best,
        before,
        after,
        hit: option.isBest
      });
      if (state.monthIndex >= data.months.length - 1) {
        state.finished = true;
      }
      render();
    }

    function nextMonth() {
      const data = dataset();
      if (state.finished) {
        startGame(state.year);
        return;
      }
      if (!state.locked) return;
      state.monthIndex = Math.min(state.monthIndex + 1, data.months.length - 1);
      state.locked = false;
      state.selectedId = null;
      render();
    }

    function renderStatus() {
      const data = dataset();
      const month = data?.months[state.monthIndex];
      const hits = state.history.filter((item) => item.hit).length;
      const target = data?.targetCapital || 100000000;
      els.currentMonth.textContent = month ? month.label : "--";
      els.currentCapital.textContent = formatMoney(state.capital);
      els.hitCount.textContent = `${hits}/${state.history.length || data?.months.length || 0}`;
      els.targetProgress.textContent = `${Math.min(9999, (state.capital / target) * 100).toFixed(2)}%`;
    }

    function renderGame() {
      const data = dataset();
      if (!data) {
        els.gameRoot.innerHTML = `
          <section class="empty-state">
            <h2>数据未生成</h2>
            <p>运行 scripts/build_data.py 后刷新页面。</p>
          </section>
        `;
        return;
      }

      const month = data.months[state.monthIndex];
      const last = state.history[state.history.length - 1];
      const resultText = state.locked
        ? `${last.hit ? "命中" : "未命中"}：${last.selected.name} ${formatPct(last.selected.returnRate)}`
        : "本月标的";
      const resultDetail = state.locked
        ? `最优为 ${month.best.name} ${formatPct(month.best.returnRate)}，账户 ${formatMoneyFull(last.before)} → ${formatMoneyFull(last.after)}`
        : `${compactDate(month.marketStart)} 至 ${compactDate(month.marketEnd)}，候选池 ${month.candidateCount} 只`;

      els.gameRoot.innerHTML = `
        <section class="play">
          <div class="question-panel">
            <div class="month-head">
              <h2>${month.label}</h2>
              <div class="dates">${compactDate(month.marketStart)} / ${compactDate(month.marketEnd)}</div>
            </div>
            <div class="options" id="options"></div>
            <div class="result-band">
              <div class="result-copy">
                <strong>${escapeHtml(resultText)}</strong>
                <span>${escapeHtml(resultDetail)}</span>
              </div>
              <button class="primary-button" id="nextBtn" type="button" ${state.locked ? "" : "disabled"}>
                ${state.finished ? "再来一次" : "下一月"}
              </button>
            </div>
          </div>
          <aside class="chart-panel">
            <div class="chart-title">
              <h2>资金曲线</h2>
              <span>${data.year} · ${data.months.length}个月</span>
            </div>
            <canvas id="capitalChart" width="720" height="500" aria-label="资金曲线"></canvas>
            <div class="legend">
              <span><i class="key"></i> 当前路线</span>
              <span><i class="key best"></i> 每月最优</span>
            </div>
          </aside>
        </section>
        ${renderHistory()}
      `;

      const optionsRoot = document.getElementById("options");
      month.options.forEach((option) => optionsRoot.appendChild(renderOption(option)));
      document.getElementById("nextBtn").addEventListener("click", nextMonth);
      drawChart();
    }

    function renderHistory() {
      if (!state.history.length) return "";
      const rows = state.history
        .map((item) => `
          <tr>
            <td>${escapeHtml(item.label)}</td>
            <td>${escapeHtml(item.selected.name)}<br><span class="meta">${escapeHtml(item.selected.tsCode)}</span></td>
            <td><span class="${item.selected.returnRate >= 0 ? "return up" : "return down"}">${formatPct(item.selected.returnRate)}</span></td>
            <td>${escapeHtml(item.best.name)}<br><span class="meta">${formatPct(item.best.returnRate)}</span></td>
            <td>${formatMoneyFull(item.after)}</td>
          </tr>
        `)
        .join("");
      return `
        <section class="history-panel">
          <div class="history-head">
            <h2>月度流水</h2>
            <span class="meta">${state.history.length} / ${dataset().months.length}</span>
          </div>
          <div class="history-table-wrap">
            <table>
              <thead>
                <tr>
                  <th>月份</th>
                  <th>选择</th>
                  <th>收益</th>
                  <th>最优</th>
                  <th>期末资金</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </section>
      `;
    }

    function drawChart() {
      const canvas = document.getElementById("capitalChart");
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * dpr));
      canvas.height = Math.max(1, Math.floor(rect.height * dpr));
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const width = rect.width;
      const height = rect.height;
      const pad = { left: 44, right: 16, top: 18, bottom: 30 };
      ctx.clearRect(0, 0, width, height);

      const data = dataset();
      const selectedPath = [state.initialCapital];
      state.history.forEach((item) => selectedPath.push(item.after));

      const bestPath = [state.initialCapital];
      data.months.forEach((month, index) => {
        if (index < state.history.length) {
          const prev = bestPath[bestPath.length - 1];
          bestPath.push(prev * (1 + month.best.returnRate));
        }
      });

      const values = [...selectedPath, ...bestPath, data.targetCapital].filter((item) => item > 0);
      const minLog = Math.log10(Math.max(1, Math.min(...values) * 0.8));
      const maxLog = Math.log10(Math.max(...values) * 1.15);
      const maxSteps = data.months.length;
      const chartW = width - pad.left - pad.right;
      const chartH = height - pad.top - pad.bottom;

      function x(index) {
        return pad.left + (chartW * index) / maxSteps;
      }

      function y(value) {
        const log = Math.log10(Math.max(1, value));
        return pad.top + chartH - ((log - minLog) / (maxLog - minLog || 1)) * chartH;
      }

      ctx.strokeStyle = "#dce3e8";
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let i = 0; i <= 4; i += 1) {
        const yy = pad.top + (chartH * i) / 4;
        ctx.moveTo(pad.left, yy);
        ctx.lineTo(width - pad.right, yy);
      }
      ctx.stroke();

      ctx.fillStyle = "#64727d";
      ctx.font = "12px Microsoft YaHei, sans-serif";
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      [state.initialCapital, data.targetCapital].forEach((value) => {
        const yy = y(value);
        ctx.fillText(formatMoney(value), pad.left - 8, yy);
      });

      function drawLine(path, color) {
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.lineJoin = "round";
        ctx.lineCap = "round";
        ctx.beginPath();
        path.forEach((value, index) => {
          const xx = x(index);
          const yy = y(value);
          if (index === 0) ctx.moveTo(xx, yy);
          else ctx.lineTo(xx, yy);
        });
        ctx.stroke();
        ctx.fillStyle = color;
        path.forEach((value, index) => {
          ctx.beginPath();
          ctx.arc(x(index), y(value), 3.5, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      drawLine(bestPath, "#a86900");
      drawLine(selectedPath, "#138a54");

      ctx.strokeStyle = "#c43d3d";
      ctx.setLineDash([5, 5]);
      ctx.beginPath();
      ctx.moveTo(pad.left, y(data.targetCapital));
      ctx.lineTo(width - pad.right, y(data.targetCapital));
      ctx.stroke();
      ctx.setLineDash([]);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function render() {
      renderYearTabs();
      renderStatus();
      renderGame();
    }

    els.restartBtn.addEventListener("click", () => startGame(state.year));
    els.initialCapital.addEventListener("change", () => startGame(state.year));
    window.addEventListener("resize", () => drawChart());

    if (years.length) {
      const selectedData = dataset();
      els.initialCapital.value = selectedData?.initialCapital || 10000;
      startGame(state.year);
    } else {
      renderStatus();
      renderGame();
    }
  </script>
</body>
</html>
